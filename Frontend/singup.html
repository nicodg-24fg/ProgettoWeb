<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Log in</title>
    <script src="https://kit.fontawesome.com/848bf17538.js" crossorigin="anonymous"></script>
</head>
<body>
      <h1> Nome sito</h1>

            <div id="container">
            <br>
            <div id="formContainer">
                <form id="Form">
                   
                    <h2>Crea il tuo account</h2> <br>
                    <label for="name">username:</label>
                    <input type="text" id="name" name="name" placeholder="username"><br><br>

                    <label for="birthdate"> Data di nascita:</label>
                    <input type="date" id="birthdate" name="birthdate"><br><br>

                    <label for="scelta">Utente:</label> 
                    <select id="scelta" name="scelta" placeholder="Utente">
                        <option value="artista">Artista</option>
                        <option value="gestore">Gestore</option>
                    </select><br><br>


                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="nome.cognome@esempio.com"><br><br>

                    <div class="form-group">
                        <label for="password">Password:</label>
                        <div class="password-container">
                            <input type="password" id="password" name="password" placeholder="password">
                            <button type="button" id="showPasswordBtn"> 
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="passwordConfirm">Conferma Password:</label>
                        <div class="password-container">
                            <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="password">
                            <button type="button" id="showPasswordConfirmBtn"> 
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <label for="bio"> Bio:</label>
                    <input type="text" id="bio" name="bio">
                    <br><br>

                    <button type="button" id="submitBtn">Invio</button><br><br>


                    <p id="paragraph">Hai già un account? <a href="index.html" target=_self>Log in</a></p>
                </form>

          </div>
        </div>
        <script src="index.js"></script>
    
</body>
</html>
